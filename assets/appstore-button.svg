<svg viewBox="0 0 280 84" xmlns="http://www.w3.org/2000/svg">
  <!-- Black Background with subtle rounded corners -->
  <rect width="280" height="84" rx="15" fill="#000000"/>
  
  <!-- Subtle top highlight for depth -->
  <rect width="280" height="1" rx="15" fill="white" opacity="0.1"/>
  
  <!-- Apple Logo Icon (simplified) -->
  <g transform="translate(20, 18)">
    <!-- App Store grid icon -->
    <g fill="white">
      <rect x="6" y="6" width="8" height="8" rx="1.5"/>
      <rect x="18" y="6" width="8" height="8" rx="1.5"/>
      <rect x="30" y="6" width="8" height="8" rx="1.5"/>
      <rect x="6" y="18" width="8" height="8" rx="1.5"/>
      <rect x="18" y="18" width="8" height="8" rx="1.5"/>
      <rect x="30" y="18" width="8" height="8" rx="1.5"/>
      <rect x="6" y="30" width="8" height="8" rx="1.5"/>
      <rect x="18" y="30" width="8" height="8" rx="1.5"/>
      <rect x="30" y="30" width="8" height="8" rx="1.5"/>
    </g>
  </g>
  
  <!-- Text Content -->
  <!-- "DOWNLOAD ON THE" small text -->
  <text x="110" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="white" opacity="0.8" letter-spacing="0.5">GET IT ON</text>
  
  <!-- "App Store" main text -->
  <text x="110" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="white" letter-spacing="-0.5">App Store</text>
</svg>
