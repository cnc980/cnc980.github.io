<svg width="1080" height="680" viewBox="0 0 1080 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="节点分享示意图">
  <defs>
    <style>
      .bg{fill:#f6f7fb}.phone{fill:#101828}.screen{fill:#fff}.qr{fill:#fff;stroke:#d7deea}.dark{fill:#172033}.box{fill:#f8fafc;stroke:#d7deea}.btn{fill:#2f6fed}.btn2{fill:#eef3ff;stroke:#bdd0ff}.title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.text{font:500 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344054}.muted{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}.white{font:600 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white}.call{fill:#fff;stroke:#d8deea;stroke-width:2}.line{stroke:#2f6fed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1080" height="680" rx="28"/>
  <text x="58" y="70" class="title">节点分享</text>
  <text x="58" y="106" class="muted">生成二维码，复制原始链接，或通过系统分享面板发送。</text>
  <rect class="phone" x="90" y="132" width="350" height="510" rx="48"/>
  <rect class="screen" x="112" y="162" width="306" height="450" rx="28"/>
  <text x="168" y="212" class="title" font-size="24">Japan 01</text>
  <text x="226" y="242" class="muted">VLESS</text>
  <rect class="qr" x="176" y="266" width="176" height="176" rx="6"/>
  <rect class="dark" x="196" y="286" width="42" height="42"/><rect class="dark" x="290" y="286" width="42" height="42"/>
  <rect class="dark" x="196" y="380" width="42" height="42"/><rect class="dark" x="254" y="334" width="20" height="20"/><rect class="dark" x="282" y="364" width="18" height="18"/><rect class="dark" x="318" y="394" width="14" height="14"/>
  <rect class="box" x="142" y="462" width="246" height="72" rx="14"/>
  <text x="160" y="490" class="muted">服务器：jp.example.com</text>
  <text x="160" y="516" class="muted">最佳延迟：88 ms</text>
  <rect class="btn" x="142" y="552" width="112" height="42" rx="12"/>
  <text x="168" y="579" class="white">复制链接</text>
  <rect class="btn2" x="276" y="552" width="112" height="42" rx="12"/>
  <text x="316" y="579" class="text" font-size="18">分享</text>
  <rect class="call" x="520" y="184" width="430" height="94" rx="22"/>
  <text x="552" y="222" class="text">二维码</text>
  <text x="552" y="252" class="muted">可给其他客户端扫码导入节点。</text>
  <path class="line" d="M518 232 C470 260 408 320 352 340"/>
  <rect class="call" x="520" y="326" width="430" height="94" rx="22"/>
  <text x="552" y="364" class="text">节点详情</text>
  <text x="552" y="394" class="muted">服务器、端口、延迟和原始链接都在这里查看。</text>
  <path class="line" d="M518 376 C470 432 426 476 388 496"/>
  <rect class="call" x="520" y="468" width="430" height="94" rx="22"/>
  <text x="552" y="506" class="text">复制或分享</text>
  <text x="552" y="536" class="muted">免费版完成操作后可能按频率展示插页广告。</text>
  <path class="line" d="M518 520 C470 550 430 568 388 574"/>
</svg>

