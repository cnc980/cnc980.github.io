  <text x="461" y="324" class="text">筛选排序</text>
  <text x="461" y="360" class="text">批量测速</text>
  <text x="461" y="396" class="text">收藏分享</text>
  <path class="line" d="M686 289 H784"/>
  <rect class="card" x="784" y="166" width="250" height="246" rx="24"/>
  <circle class="accent" cx="909" cy="218" r="34"/>
