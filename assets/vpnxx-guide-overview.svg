  <text x="103" y="396" class="text">扫码导入</text>
  <path class="line" d="M328 289 H426"/>
  <rect class="card" x="426" y="166" width="250" height="246" rx="24"/>
  <circle class="accent" cx="551" cy="218" r="34"/>
  <text x="537" y="226" font-size="30" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">2</text>
