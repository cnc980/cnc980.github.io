  <rect class="card" x="68" y="166" width="250" height="246" rx="24"/>
  <circle class="accent" cx="193" cy="218" r="34"/>
  <text x="180" y="226" font-size="30" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">1</text>
