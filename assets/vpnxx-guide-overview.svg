<svg width="1080" height="560" viewBox="0 0 1080 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VPN XX 功能总览">
  <defs>
    <style>
      .bg{fill:#f6f7fb}.card{fill:#fff;stroke:#d8deea;stroke-width:2}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.text{font:500 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#35425f}.small{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#68748a}.pill{fill:#eef3ff;stroke:#bdd0ff}.accent{fill:#2f6fed}.line{stroke:#91a4c7;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#91a4c7"/></marker>
  </defs>
  <rect class="bg" width="1080" height="560" rx="28"/>
  <text x="54" y="70" class="title">VPN XX 使用流程</text>
