<svg width="1080" height="700" viewBox="0 0 1080 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="设置和 iCloud 示意图">
  <defs>
    <style>
      .bg{fill:#f6f7fb}.phone{fill:#101828}.screen{fill:#fff}.section{fill:#f8fafc;stroke:#d7deea}.danger{fill:#fff1f3;stroke:#fda29b}.title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.text{font:500 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344054}.muted{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}.red{fill:#d92d20}.call{fill:#fff;stroke:#d8deea;stroke-width:2}.line{stroke:#2f6fed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1080" height="700" rx="28"/>
  <text x="58" y="70" class="title">设置、同步与数据管理</text>
  <text x="58" y="106" class="muted">检查 iCloud、同步数据、清除本地或云端数据。</text>
  <rect class="phone" x="82" y="132" width="370" height="528" rx="48"/>
  <rect class="screen" x="106" y="162" width="322" height="468" rx="28"/>
  <text x="136" y="210" class="title" font-size="24">控制中心</text>
  <rect class="section" x="136" y="236" width="262" height="112" rx="16"/>
  <text x="154" y="264" class="text" font-size="18">iCloud 同步</text>
  <text x="154" y="292" class="muted">状态：已登录</text>
  <text x="154" y="320" class="muted">检查 / 自检 / 立即同步</text>
  <rect class="section" x="136" y="366" width="262" height="86" rx="16"/>
  <text x="154" y="394" class="text" font-size="18">数据管理</text>
  <text x="154" y="422" class="muted">清除本地数据 / 从 iCloud 恢复</text>
  <rect class="section" x="136" y="470" width="262" height="74" rx="16"/>
  <text x="154" y="498" class="text" font-size="18">节点系统</text>
  <text x="154" y="526" class="muted">节点数量 / 测速所有节点</text>
  <rect class="danger" x="136" y="562" width="262" height="46" rx="16"/>
  <text x="154" y="591" class="red" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">清除 iCloud / 全部清除</text>
  <rect class="call" x="540" y="166" width="420" height="96" rx="22"/>
  <text x="572" y="204" class="text">先检查 iCloud 状态</text>
  <text x="572" y="234" class="muted">未登录或受限时，同步和恢复可能失败。</text>
  <path class="line" d="M538 220 C490 240 430 270 398 286"/>
  <rect class="call" x="540" y="316" width="420" height="96" rx="22"/>
  <text x="572" y="354" class="text">本地清除可从云端恢复</text>
  <text x="572" y="384" class="muted">只清本地不会删除 iCloud 数据。</text>
  <path class="line" d="M538 364 C492 386 432 410 398 410"/>
  <rect class="call" x="540" y="466" width="420" height="96" rx="22"/>
  <text x="572" y="504" class="text">清除云端要谨慎</text>
  <text x="572" y="534" class="muted">全部清除后不能再通过 iCloud 恢复。</text>
  <path class="line" d="M538 518 C490 556 434 584 398 586"/>
</svg>

