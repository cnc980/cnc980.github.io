<svg width="1080" height="680" viewBox="0 0 1080 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="添加订阅示意图">
  <defs>
    <style>
      .bg{fill:#f6f7fb}.phone{fill:#101828}.screen{fill:#fff}.bar{fill:#f1f4f9}.field{fill:#f8fafc;stroke:#d7deea}.button{fill:#2f6fed}.button2{fill:#eef3ff;stroke:#bdd0ff}.title{font:700 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.text{font:500 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344054}.muted{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}.white{font:600 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:white}.call{fill:#fff;stroke:#d8deea;stroke-width:2}.num{fill:#2f6fed}.line{stroke:#2f6fed;stroke-width:3;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1080" height="680" rx="28"/>
  <text x="62" y="70" class="title">添加订阅或节点</text>
  <text x="62" y="106" class="muted">订阅 URL、单条节点、多行节点、Base64 内容都可以从这里导入。</text>
  <rect class="phone" x="90" y="140" width="350" height="500" rx="48"/>
  <rect class="screen" x="112" y="170" width="306" height="440" rx="28"/>
  <text x="142" y="220" class="title" font-size="24">订阅管理</text>
  <rect class="bar" x="136" y="246" width="258" height="38" rx="19"/>
  <text x="155" y="271" class="muted">搜索订阅、节点、地址</text>
  <text x="142" y="322" class="text">添加订阅</text>
  <rect class="field" x="142" y="340" width="246" height="46" rx="12"/>
  <text x="160" y="370" class="muted">名称</text>
  <rect class="field" x="142" y="398" width="246" height="46" rx="12"/>
  <text x="160" y="428" class="muted">URL 或节点链接</text>
  <rect class="button" x="142" y="462" width="112" height="44" rx="12"/>
  <text x="178" y="490" class="white">添加</text>
  <rect class="button2" x="276" y="462" width="112" height="44" rx="12"/>
  <text x="306" y="490" class="text" font-size="19">剪贴板</text>
  <rect class="button2" x="142" y="522" width="246" height="44" rx="12"/>
  <text x="224" y="550" class="text" font-size="19">扫码导入</text>
  <rect class="call" x="520" y="158" width="430" height="100" rx="22"/>
  <circle class="num" cx="560" cy="208" r="20"/>
  <text x="554" y="216" class="white">1</text>
  <text x="590" y="198" class="text">手动粘贴订阅 URL 或节点链接</text>
  <text x="590" y="228" class="muted">名称可选，便于后续搜索和识别。</text>
  <path class="line" d="M518 220 C470 260 430 360 392 418"/>
  <rect class="call" x="520" y="298" width="430" height="100" rx="22"/>
  <circle class="num" cx="560" cy="348" r="20"/>
  <text x="554" y="356" class="white">2</text>
  <text x="590" y="338" class="text">从剪贴板快速导入</text>
  <text x="590" y="368" class="muted">适合刚复制的订阅文本或节点链接。</text>
  <path class="line" d="M518 350 C470 380 432 456 388 484"/>
  <rect class="call" x="520" y="438" width="430" height="100" rx="22"/>
  <circle class="num" cx="560" cy="488" r="20"/>
  <text x="554" y="496" class="white">3</text>
  <text x="590" y="478" class="text">扫码导入二维码</text>
  <text x="590" y="508" class="muted">首次使用需要允许相机权限。</text>
  <path class="line" d="M518 494 C470 520 430 540 388 544"/>
</svg>

